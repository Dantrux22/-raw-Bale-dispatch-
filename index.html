<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Bale Dispatch</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');
 
  :root {
    --navy: #0f1923;
    --navy2: #1a2a3a;
    --steel: #2c3e50;
    --accent: #e8b84b;
    --accent2: #f0c060;
    --light: #f4f7fa;
    --mid: #dde4ed;
    --muted: #7a8a9a;
    --white: #ffffff;
    --green: #2ecc71;
    --red: #e74c3c;
    --radius: 12px;
  }
 
  * { box-sizing: border-box; margin: 0; padding: 0; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    min-height: 100vh;
    padding-bottom: 100px;
  }
 
  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
    border-bottom: 2px solid var(--accent);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 15px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .total-badge {
    background: var(--accent);
    color: var(--navy);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 500;
    padding: 5px 12px;
    border-radius: 20px;
  }
 
  /* SECTIONS */
  .section {
    margin: 16px 16px 0;
    background: var(--navy2);
    border-radius: var(--radius);
    border: 1px solid rgba(255,255,255,0.07);
    overflow: hidden;
  }
  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 12px 16px 8px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }
 
  /* FORM FIELDS */
  .field-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0;
  }
  .field {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    border-right: 1px solid rgba(255,255,255,0.05);
  }
  .field:nth-child(even) { border-right: none; }
  .field.full { grid-column: 1 / -1; border-right: none; }
  .field label {
    display: block;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px;
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 9px 12px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
  }
  .field select option { background: var(--navy2); }
 
  /* NOTE */
  .note-box {
    margin: 12px 16px 0;
    background: rgba(232,184,75,0.1);
    border: 1px solid rgba(232,184,75,0.3);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent2);
    line-height: 1.5;
  }
  .note-box span { font-weight: 600; }
 
  /* BALE TABLE */
  .bale-list {
    padding: 0;
  }
  .bale-header {
    display: grid;
    grid-template-columns: 52px 1fr 52px 36px;
    padding: 8px 16px;
    background: rgba(232,184,75,0.12);
    border-bottom: 1px solid rgba(232,184,75,0.2);
  }
  .bale-header span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .bale-row {
    display: grid;
    grid-template-columns: 52px 1fr 52px 36px;
    align-items: center;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    transition: background 0.15s;
  }
  .bale-next {
    background: rgba(232,184,75,0.1);
    border: none;
    border-left: 1px solid rgba(255,255,255,0.06);
    color: var(--accent);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 0;
    height: 100%;
    min-height: 46px;
    cursor: pointer;
    transition: background 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .bale-next:active { background: rgba(232,184,75,0.25); }
  .bale-row:last-child { border-bottom: none; }
  .bale-row.has-value { background: rgba(46,204,113,0.04); }
  .bale-nr {
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    color: var(--muted);
    padding: 0 0 0 16px;
    user-select: none;
  }
  .bale-row.has-value .bale-nr { color: var(--accent); }
  .bale-input {
    background: transparent;
    border: none;
    border-left: 1px solid rgba(255,255,255,0.05);
    color: var(--white);
    font-family: 'DM Mono', monospace;
    font-size: 16px;
    padding: 13px 12px;
    outline: none;
    width: 100%;
    -webkit-appearance: none;
  }
  .bale-input:focus { background: rgba(255,255,255,0.03); }
  .bale-input::placeholder { color: rgba(255,255,255,0.15); }
  .bale-del {
    background: none;
    border: none;
    color: rgba(231,76,60,0.4);
    font-size: 18px;
    cursor: pointer;
    padding: 0 10px;
    line-height: 1;
    transition: color 0.2s;
  }
  .bale-del:hover { color: var(--red); }
 
  /* TOTAL ROW */
  .total-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 14px 16px;
    background: rgba(232,184,75,0.08);
    border-top: 1px solid rgba(232,184,75,0.2);
  }
  .total-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--accent);
  }
  .total-value {
    font-family: 'DM Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    color: var(--white);
  }
  .total-value span { font-size: 12px; color: var(--muted); margin-left: 4px; }
 
  /* PHOTOS */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 12px;
  }
  .photo-thumb {
    aspect-ratio: 4/3;
    border-radius: 8px;
    overflow: hidden;
    position: relative;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
  }
  .photo-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  .photo-del {
    position: absolute;
    top: 4px;
    right: 4px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: white;
    width: 22px;
    height: 22px;
    border-radius: 50%;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .photo-add-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    padding: 0 12px 12px;
  }
  .photo-btn {
    background: rgba(255,255,255,0.05);
    border: 1.5px dashed rgba(255,255,255,0.15);
    border-radius: 10px;
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 14px 10px;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    transition: all 0.2s;
  }
  .photo-btn:hover { border-color: var(--accent); color: var(--accent); }
  .photo-btn .icon { font-size: 22px; }
 
  /* EXPORT BUTTON */
  .export-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 12px 16px;
    background: linear-gradient(to top, var(--navy) 60%, transparent);
    display: flex;
    gap: 10px;
  }
  .btn-export {
    flex: 1;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: var(--navy);
    font-family: 'DM Sans', sans-serif;
    font-size: 16px;
    font-weight: 600;
    padding: 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: transform 0.15s, background 0.2s;
    letter-spacing: 0.5px;
  }
  .btn-export:active { transform: scale(0.97); }
  .btn-wsp {
    background: #25d366;
    color: white;
    border-radius: var(--radius);
    border: none;
    padding: 16px 18px;
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.15s;
  }
  .btn-wsp:active { transform: scale(0.97); }
 
  /* HIDDEN FILE INPUTS */
  input[type="file"] { display: none; }
 
  /* RESET BTN */
  .btn-reset {
    display: block;
    width: calc(100% - 32px);
    margin: 14px 16px 0;
    background: rgba(231,76,60,0.1);
    border: 1px solid rgba(231,76,60,0.25);
    border-radius: var(--radius);
    color: var(--red);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 11px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
 
<header>
  <h1>Bale Dispatch</h1>
  <div class="total-badge" id="headerBaleCount">0 bales</div>
</header>
 
<!-- INFO SECTION -->
<div class="section">
  <div class="section-label">Dispatch Info</div>
  <div class="field-row">
    <div class="field">
      <label>Date</label>
      <input type="date" id="dispatchDate">
    </div>
    <div class="field">
      <label>Bale Type</label>
      <select id="baleType">
        <option value="Car Tyres">Car Tyres</option>
        <option value="Truck Tyres">Truck Tyres</option>
        <option value="Tractor Tyres">Tractor Tyres</option>
      </select>
    </div>
    <div class="field full">
      <label>Location</label>
      <input type="text" id="location" value="Cromwell" placeholder="e.g. Cromwell">
    </div>
  </div>
</div>
 
<!-- NOTE -->
<div class="note-box">
  <span>Note:</span> Each bale was individually weighed using the on-site scale. Weights are approximate and may not be exact.
</div>
 
<!-- BALE TABLE -->
<div class="section" style="margin-top:16px;">
  <div class="section-label">Bale Weights</div>
  <div class="bale-header">
    <span>Bale</span>
    <span style="padding-left:12px;">Weight (kg)</span>
    <span style="text-align:center;">Next</span>
    <span></span>
  </div>
  <div class="bale-list" id="baleList"></div>
  <div class="total-row">
    <div class="total-label">Total · <span id="baleCount">0</span> bales</div>
    <div class="total-value" id="totalKg">0 <span>kg</span></div>
  </div>
</div>
 
<!-- PHOTOS -->
<div class="section" style="margin-top:16px;">
  <div class="section-label">Photos</div>
  <div class="photo-grid" id="photoGrid"></div>
  <div class="photo-add-btns">
    <button class="photo-btn" onclick="document.getElementById('cameraInput').click()">
      <span class="icon">📷</span>
      Take Photo
    </button>
    <button class="photo-btn" onclick="document.getElementById('galleryInput').click()">
      <span class="icon">🖼️</span>
      From Gallery
    </button>
  </div>
  <input type="file" id="cameraInput" accept="image/*" capture="environment" multiple onchange="handlePhotos(this)">
  <input type="file" id="galleryInput" accept="image/*" multiple onchange="handlePhotos(this)">
</div>
 
<button class="btn-reset" onclick="resetForm()">↺ Reset Form</button>
 
<!-- EXPORT BAR -->
<div class="export-bar">
  <button class="btn-export" onclick="exportPDF(false)">
    ✓ Export PDF
  </button>
  <button class="btn-wsp" onclick="exportPDF(true)" title="Share via WhatsApp">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
    </svg>
  </button>
</div>
 
<script>
// ── STATE ──────────────────────────────────────────────────────────
let bales = [{ id: 1, kg: '' }];
let photos = []; // array of { dataUrl }
 
// ── INIT ────────────────────────────────────────────────────────────
function init() {
  const today = new Date();
  const y = today.getFullYear();
  const m = String(today.getMonth() + 1).padStart(2, '0');
  const d = String(today.getDate()).padStart(2, '0');
  document.getElementById('dispatchDate').value = `${y}-${m}-${d}`;
  renderBales();
}
 
// ── BALE RENDERING ──────────────────────────────────────────────────
function renderBales(focusIndex) {
  const list = document.getElementById('baleList');
  list.innerHTML = '';
  bales.forEach((b, i) => {
    const row = document.createElement('div');
    row.className = 'bale-row' + (b.kg !== '' ? ' has-value' : '');
    row.dataset.index = i;
 
    const nr = document.createElement('div');
    nr.className = 'bale-nr';
    nr.textContent = b.id;
 
    const inp = document.createElement('input');
    inp.className = 'bale-input';
    inp.type = 'tel'; // numeric keyboard, no spinner arrows, no dismiss on first digit
    inp.inputMode = 'numeric';
    inp.pattern = '[0-9]*';
    inp.placeholder = '— kg';
    inp.value = b.kg !== '' ? b.kg : '';
    inp.dataset.index = i;
 
    // Update state on every keystroke — NO re-render
    inp.addEventListener('input', function() {
      const val = this.value.replace(/\D/g, '');
      this.value = val; // strip non-numeric
      bales[i].kg = val !== '' ? parseInt(val) : '';
      row.className = 'bale-row' + (val !== '' ? ' has-value' : '');
      nr.style.color = val !== '' ? 'var(--accent)' : '';
      updateTotals();
      // If this is the last row and has a value → silently add a new row
      if (i === bales.length - 1 && val !== '') {
        bales.push({ id: bales.length + 1, kg: '' });
        addRowToDOM(bales.length - 1); // append only, no full re-render
      }
    });
 
    // Enter / Next → jump to next input
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); focusNext(i); }
    });
 
    inp.addEventListener('focus', function() {
      setTimeout(() => this.scrollIntoView({ behavior: 'smooth', block: 'center' }), 250);
    });
 
    const del = document.createElement('button');
    del.className = 'bale-del';
    del.title = 'Remove';
    del.textContent = '×';
    del.addEventListener('click', () => deleteBale(i));
 
    const next = document.createElement('button');
    next.className = 'bale-next';
    next.title = 'Next bale';
    next.textContent = '→';
    next.addEventListener('click', () => focusNext(i));
 
    row.appendChild(nr);
    row.appendChild(inp);
    row.appendChild(next);
    row.appendChild(del);
    list.appendChild(row);
  });
  updateTotals();
 
  // Focus requested index
  if (focusIndex !== undefined) {
    const inputs = document.querySelectorAll('.bale-input');
    if (inputs[focusIndex]) {
      setTimeout(() => { inputs[focusIndex].focus(); inputs[focusIndex].scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 50);
    }
  }
}
 
// Append a single new row without touching existing ones
function addRowToDOM(index) {
  const b = bales[index];
  const list = document.getElementById('baleList');
 
  const row = document.createElement('div');
  row.className = 'bale-row';
  row.dataset.index = index;
 
  const nr = document.createElement('div');
  nr.className = 'bale-nr';
  nr.textContent = b.id;
 
  const inp = document.createElement('input');
  inp.className = 'bale-input';
  inp.type = 'tel';
  inp.inputMode = 'numeric';
  inp.pattern = '[0-9]*';
  inp.placeholder = '— kg';
  inp.dataset.index = index;
 
  inp.addEventListener('input', function() {
    const val = this.value.replace(/\D/g, '');
    this.value = val;
    bales[index].kg = val !== '' ? parseInt(val) : '';
    row.className = 'bale-row' + (val !== '' ? ' has-value' : '');
    nr.style.color = val !== '' ? 'var(--accent)' : '';
    updateTotals();
    if (index === bales.length - 1 && val !== '') {
      bales.push({ id: bales.length + 1, kg: '' });
      addRowToDOM(bales.length - 1);
    }
  });
 
  inp.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); focusNext(index); }
  });
 
  inp.addEventListener('focus', function() {
    setTimeout(() => this.scrollIntoView({ behavior: 'smooth', block: 'center' }), 250);
  });
 
  const del = document.createElement('button');
  del.className = 'bale-del';
  del.title = 'Remove';
  del.textContent = '×';
  del.addEventListener('click', () => deleteBale(index));
 
  const nextBtn = document.createElement('button');
  nextBtn.className = 'bale-next';
  nextBtn.title = 'Next bale';
  nextBtn.textContent = '→';
  nextBtn.addEventListener('click', () => focusNext(index));
 
  row.appendChild(nr);
  row.appendChild(inp);
  row.appendChild(nextBtn);
  row.appendChild(del);
  list.appendChild(row);
}
 
function focusNext(currentIndex) {
  const inputs = document.querySelectorAll('.bale-input');
  const next = inputs[currentIndex + 1];
  if (next) {
    next.focus();
    next.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
}
 
function deleteBale(index) {
  if (bales.length === 1) { bales[0].kg = ''; renderBales(); return; }
  bales.splice(index, 1);
  bales.forEach((b, i) => b.id = i + 1);
  renderBales();
}
 
function autoAddRow() {
  // No-op: rows are now added dynamically in the input listener
}
 
function updateTotals() {
  const filled = bales.filter(b => b.kg !== '' && b.kg !== undefined && !isNaN(b.kg));
  const total = filled.reduce((s, b) => s + parseInt(b.kg), 0);
  const count = filled.length;
  document.getElementById('baleCount').textContent = count;
  document.getElementById('totalKg').innerHTML = `${total.toLocaleString()} <span>kg</span>`;
  document.getElementById('headerBaleCount').textContent = `${count} bale${count !== 1 ? 's' : ''}`;
}
 
// ── PHOTOS ──────────────────────────────────────────────────────────
function handlePhotos(input) {
  const files = Array.from(input.files);
  const promises = files.map(f => new Promise(res => {
    const r = new FileReader();
    r.onload = e => res(e.target.result);
    r.readAsDataURL(f);
  }));
  Promise.all(promises).then(results => {
    results.forEach(url => photos.push({ dataUrl: url }));
    renderPhotos();
    input.value = '';
  });
}
 
function renderPhotos() {
  const grid = document.getElementById('photoGrid');
  grid.innerHTML = '';
  photos.forEach((p, i) => {
    const div = document.createElement('div');
    div.className = 'photo-thumb';
    div.innerHTML = `<img src="${p.dataUrl}"><button class="photo-del" onclick="deletePhoto(${i})">×</button>`;
    grid.appendChild(div);
  });
}
 
function deletePhoto(i) {
  photos.splice(i, 1);
  renderPhotos();
}
 
// ── RESET ────────────────────────────────────────────────────────────
function resetForm() {
  if (!confirm('Reset all bale weights and photos?')) return;
  bales = [{ id: 1, kg: '' }];
  photos = [];
  renderBales();
  renderPhotos();
}
 
// ── PDF EXPORT ───────────────────────────────────────────────────────
async function exportPDF(shareWsp) {
  const filledBales = bales.filter(b => b.kg !== '' && b.kg !== undefined && !isNaN(b.kg));
  if (filledBales.length === 0) { alert('Please enter at least one bale weight.'); return; }
 
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation: 'portrait', unit: 'mm', format: 'a4' });
  const W = 210, H = 297;
  const ml = 15, mr = 15;
  const usableW = W - ml - mr;
  let y = 15;
 
  // ── FONTS / COLORS
  const navy = [15, 25, 35];
  const accent = [232, 184, 75];
  const white = [255, 255, 255];
  const muted = [122, 138, 154];
  const light = [244, 247, 250];
  const lightBlue = [240, 244, 251];
 
  // ── TITLE BAR
  doc.setFillColor(...navy);
  doc.rect(0, 0, W, 22, 'F');
  doc.setFillColor(...accent);
  doc.rect(0, 22, W, 1.5, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(16);
  doc.setTextColor(...white);
  doc.text('BALE DISPATCH RECORD', W / 2, 14, { align: 'center' });
  doc.setFont('helvetica', 'normal');
  doc.setFontSize(8);
  doc.setTextColor(...accent);
  doc.text('Smart Environmental Limited', W / 2, 19.5, { align: 'center' });
  y = 28;
 
  // ── INFO BLOCK
  const dateVal = document.getElementById('dispatchDate').value;
  const [dy, dm, dd] = dateVal.split('-');
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const dateStr = `${parseInt(dd)} ${months[parseInt(dm)-1]} ${dy}`;
  const baleType = document.getElementById('baleType').value;
  const location = document.getElementById('location').value || 'Cromwell';
  const total = filledBales.reduce((s, b) => s + parseInt(b.kg), 0);
 
  const fields = [
    ['Date', dateStr, 'Bale Type', baleType],
    ['Location', location, 'Total Bales', String(filledBales.length)],
  ];
 
  const col = usableW / 4;
  fields.forEach((row, ri) => {
    const rowY = y + ri * 10;
    [0, 1, 2, 3].forEach((ci) => {
      const x = ml + ci * col;
      const bg = (ri + ci) % 2 === 0 ? light : lightBlue;
      doc.setFillColor(...bg);
      doc.rect(x, rowY, col, 10, 'F');
      doc.setDrawColor(221, 228, 237);
      doc.rect(x, rowY, col, 10, 'S');
      const isLabel = ci % 2 === 0;
      doc.setFont('helvetica', isLabel ? 'bold' : 'normal');
      doc.setFontSize(isLabel ? 7.5 : 9);
      doc.setTextColor(...(isLabel ? muted : navy));
      doc.text(row[ci], x + 3, rowY + 6.5);
    });
  });
  y += fields.length * 10 + 4;
 
  // ── NOTE BOX
  doc.setFillColor(255, 248, 230);
  doc.setDrawColor(240, 196, 64);
  doc.roundedRect(ml, y, usableW, 8, 2, 2, 'FD');
  doc.setFont('helvetica', 'bolditalic');
  doc.setFontSize(7);
  doc.setTextColor(122, 98, 0);
  doc.text('Note: Each bale was individually weighed using the on-site scale. Weights are approximate and may not be exact.', ml + 3, y + 5);
  y += 12;
 
  // ── BALE TABLE (2 columns)
  const half = Math.ceil(filledBales.length / 2);
  const leftCol = filledBales.slice(0, half);
  const rightCol = filledBales.slice(half);
  const colW = usableW / 2 - 2;
  const rowH = 7.5;
 
  // Header
  [[ml, 'Bale Nr.', 'Weight (kg)'], [ml + colW + 4, 'Bale Nr.', 'Weight (kg)']].forEach(([x, l1, l2]) => {
    doc.setFillColor(...navy);
    doc.rect(x, y, colW, rowH, 'F');
    doc.setFont('helvetica', 'bold');
    doc.setFontSize(8);
    doc.setTextColor(...white);
    doc.text(l1, x + 4, y + 5);
    doc.text(l2, x + colW - 4, y + 5, { align: 'right' });
  });
  y += rowH;
 
  const maxRows = Math.max(leftCol.length, rightCol.length);
  for (let i = 0; i < maxRows; i++) {
    const bg = i % 2 === 0 ? white : lightBlue;
    doc.setFillColor(...bg);
    doc.rect(ml, y, colW, rowH, 'F');
    doc.rect(ml + colW + 4, y, colW, rowH, 'F');
 
    doc.setDrawColor(221, 228, 237);
    doc.rect(ml, y, colW, rowH, 'S');
    doc.rect(ml + colW + 4, y, colW, rowH, 'S');
 
    doc.setFont('helvetica', 'normal');
    doc.setFontSize(9);
    doc.setTextColor(...navy);
 
    if (leftCol[i]) {
      doc.text(String(leftCol[i].id), ml + 4, y + 5);
      doc.text(String(leftCol[i].kg), ml + colW - 4, y + 5, { align: 'right' });
    }
    if (rightCol[i]) {
      doc.text(String(rightCol[i].id), ml + colW + 8, y + 5);
      doc.text(String(rightCol[i].kg), ml + usableW - 0, y + 5, { align: 'right' });
    }
    y += rowH;
  }
 
  // Total row
  doc.setFillColor(...navy);
  doc.rect(ml, y, usableW, rowH, 'F');
  doc.setFont('helvetica', 'bold');
  doc.setFontSize(9);
  doc.setTextColor(...white);
  doc.text('TOTAL', ml + usableW / 2 - 15, y + 5);
  doc.text(`${total.toLocaleString()} kg`, ml + usableW - 0, y + 5, { align: 'right' });
  y += rowH + 6;
 
  // ── PHOTOS
  if (photos.length > 0) {
    const remainingH = H - y - 15;
    const cols = photos.length <= 2 ? photos.length : 3;
    const rows = Math.ceil(photos.length / cols);
    const gap = 3;
    const imgW = (usableW - (cols - 1) * gap) / cols;
    const imgH = Math.min(remainingH / rows - gap, imgW * 0.65);
 
    if (y + rows * (imgH + gap) > H - 15) {
      // Reduce imgH to fit
    }
 
    for (let pi = 0; pi < photos.length; pi++) {
      const col = pi % cols;
      const row = Math.floor(pi / cols);
      const px = ml + col * (imgW + gap);
      const py = y + row * (imgH + gap);
      try {
        const fmt = photos[pi].dataUrl.includes('image/png') ? 'PNG' : 'JPEG';
        doc.addImage(photos[pi].dataUrl, fmt, px, py, imgW, imgH, undefined, 'MEDIUM');
      } catch(e) { console.warn('Image error', e); }
    }
  }
 
  // ── FILENAME
  const filename = `Dispatch_${dateStr.replace(/ /g,'_')}.pdf`;
 
  if (shareWsp) {
    const blob = doc.output('blob');
    const file = new File([blob], filename, { type: 'application/pdf' });
    if (navigator.share && navigator.canShare && navigator.canShare({ files: [file] })) {
      try {
        await navigator.share({ files: [file], title: 'Bale Dispatch Record' });
        return;
      } catch(e) { /* fall through */ }
    }
    // Fallback: download + open WhatsApp
    doc.save(filename);
    setTimeout(() => window.open('https://wa.me/?text=' + encodeURIComponent('Bale Dispatch Report – ' + dateStr), '_blank'), 800);
  } else {
    doc.save(filename);
  }
}
 
init();
</script>
</body>
</html>
